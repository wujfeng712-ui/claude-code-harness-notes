<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 150" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="ev-a" markerWidth="9" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#888888"/></marker>
  </defs>
  <path d="M198,86 L228,86" stroke="#888888" stroke-width="1.6" marker-end="url(#ev-a)"/>
  <path d="M412,86 L442,86" stroke="#888888" stroke-width="1.6" marker-end="url(#ev-a)"/>
  <path d="M626,86 L656,86" stroke="#888888" stroke-width="1.6" marker-end="url(#ev-a)"/>
  <path d="M840,86 L870,86" stroke="#888888" stroke-width="1.6" marker-end="url(#ev-a)"/>
  <!-- 1 -->
  <rect x="18" y="40" width="180" height="92" rx="8" fill="#DAE8FC" stroke="#6C8EBF" stroke-width="1.6"/>
  <text x="108" y="66" text-anchor="middle" font-size="13" font-weight="bold" fill="#1F3D66">① 基础设施</text>
  <text x="108" y="86" text-anchor="middle" font-size="11" fill="#42648f">s01 – s05</text>
  <text x="108" y="108" text-anchor="middle" font-size="10" fill="#5a7aa3">安全·可扩展·有规划</text>
  <!-- 2 -->
  <rect x="232" y="40" width="180" height="92" rx="8" fill="#D5E8D4" stroke="#82B366" stroke-width="1.6"/>
  <text x="322" y="66" text-anchor="middle" font-size="13" font-weight="bold" fill="#2D5A2D">② 上下文工程</text>
  <text x="322" y="86" text-anchor="middle" font-size="11" fill="#4a7a4a">s06 – s10</text>
  <text x="322" y="108" text-anchor="middle" font-size="10" fill="#5a8a5a">跑得久·记得住</text>
  <!-- 3 -->
  <rect x="446" y="40" width="180" height="92" rx="8" fill="#FFE6CC" stroke="#D79B00" stroke-width="1.6"/>
  <text x="536" y="66" text-anchor="middle" font-size="13" font-weight="bold" fill="#7F4F00">③ 健壮性与编排</text>
  <text x="536" y="86" text-anchor="middle" font-size="11" fill="#9c6a14">s11 – s14</text>
  <text x="536" y="108" text-anchor="middle" font-size="10" fill="#a8761f">扛得住·排得开</text>
  <!-- 4 -->
  <rect x="660" y="40" width="180" height="92" rx="8" fill="#E1D5E7" stroke="#9673A6" stroke-width="1.6"/>
  <text x="750" y="66" text-anchor="middle" font-size="13" font-weight="bold" fill="#553a66">④ 多 Agent 协作</text>
  <text x="750" y="86" text-anchor="middle" font-size="11" fill="#6f5283">s15 – s19</text>
  <text x="750" y="108" text-anchor="middle" font-size="10" fill="#7d5f92">通信·自治·隔离·外联</text>
  <!-- 5 -->
  <rect x="874" y="40" width="180" height="92" rx="8" fill="#F8CECC" stroke="#B85450" stroke-width="1.6"/>
  <text x="964" y="66" text-anchor="middle" font-size="13" font-weight="bold" fill="#6B2B28">⑤ 集大成</text>
  <text x="964" y="86" text-anchor="middle" font-size="11" fill="#8a3d39">s20</text>
  <text x="964" y="108" text-anchor="middle" font-size="10" fill="#a04a45">机制很多，循环一个</text>
  <text x="14" y="22" font-size="12" fill="#999999">问题驱动的因果链：每一篇解决上一篇暴露的新问题</text>
</svg>
