<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 930 210" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="mm-a" markerWidth="9" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#888888"/></marker>
  </defs>
  <path d="M164,66 L210,66" stroke="#888888" stroke-width="1.6" marker-end="url(#mm-a)"/>
  <path d="M334,66 L380,66" stroke="#888888" stroke-width="1.6" marker-end="url(#mm-a)"/>
  <path d="M534,66 L580,66" stroke="#888888" stroke-width="1.6" marker-end="url(#mm-a)"/>
  <path d="M695,66 L744,66" stroke="#888888" stroke-width="1.6" marker-end="url(#mm-a)"/>
  <path d="M640,101 L640,150" stroke="#888888" stroke-width="1.6" marker-end="url(#mm-a)"/>
