  <text x="652" y="130" font-size="10.5" fill="#888888">否</text>
  <!-- A Selection -->
  <rect x="14" y="40" width="150" height="52" rx="7" fill="#DAE8FC" stroke="#6C8EBF" stroke-width="1.6"/>
