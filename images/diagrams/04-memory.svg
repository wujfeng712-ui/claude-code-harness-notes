  <rect x="744" y="40" width="172" height="52" rx="7" fill="#E1D5E7" stroke="#9673A6" stroke-width="1.6"/>
  <text x="830" y="62" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#553a66">③ Consolidation</text>
  <text x="830" y="79" text-anchor="middle" font-size="9.5" fill="#7d5f92">LLM 去重合并</text>
