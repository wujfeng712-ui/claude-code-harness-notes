  <text x="89" y="79" text-anchor="middle" font-size="9.5" fill="#5a7aa3">每轮开头·选≤5条注入</text>
  <!-- B 压缩 -->
  <rect x="210" y="40" width="124" height="52" rx="7" fill="#F5F5F5" stroke="#888888" stroke-width="1.6"/>
  <text x="272" y="62" text-anchor="middle" font-size="12.5" fill="#444444">s08 压缩管线</text>
  <text x="272" y="79" text-anchor="middle" font-size="9.5" fill="#888888">会丢细节</text>
  <!-- C Extraction -->
  <rect x="380" y="40" width="154" height="52" rx="7" fill="#D5E8D4" stroke="#82B366" stroke-width="1.6"/>
  <text x="457" y="62" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#2D5A2D">② Extraction</text>
  <text x="457" y="79" text-anchor="middle" font-size="9.5" fill="#5a8a5a">压缩前快照上提取</text>
  <!-- D diamond -->
  <polygon points="640,31 700,66 640,101 580,66" fill="#FFE6CC" stroke="#D79B00" stroke-width="1.6"/>
