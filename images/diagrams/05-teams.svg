<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 300" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="tm-s" markerWidth="9" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#6C8EBF"/></marker>
    <marker id="tm-e" markerWidth="9" markerHeight="8" refX="2" refY="4" orient="auto"><path d="M8,0 L0,4 L8,8 z" fill="#6C8EBF"/></marker>
    <marker id="tm-d" markerWidth="9" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#9673A6"/></marker>
  </defs>
  <!-- Lead -->
  <rect x="24" y="120" width="120" height="56" rx="7" fill="#DAE8FC" stroke="#6C8EBF" stroke-width="1.6"/>
  <text x="84" y="146" text-anchor="middle" font-size="13" font-weight="bold" fill="#1F3D66">Lead Agent</text>
  <text x="84" y="163" text-anchor="middle" font-size="9.5" fill="#5a7aa3">派活·汇总</text>
  <!-- Bus container -->
  <rect x="210" y="70" width="270" height="160" rx="9" fill="#FFF6E6" stroke="#D79B00" stroke-width="1.6" stroke-dasharray="5 3"/>
  <text x="345" y="92" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#7F4F00">MessageBus</text>
  <text x="345" y="108" text-anchor="middle" font-size="9.5" fill="#a8761f">.mailboxes/*.jsonl</text>
  <rect x="228" y="122" width="234" height="40" rx="6" fill="#FFE6CC" stroke="#D79B00" stroke-width="1.4"/>
  <text x="345" y="146" text-anchor="middle" font-size="11" fill="#7F4F00">发 = append 一行 JSON</text>
  <rect x="228" y="174" width="234" height="40" rx="6" fill="#FFE6CC" stroke="#D79B00" stroke-width="1.4"/>
  <text x="345" y="198" text-anchor="middle" font-size="11" fill="#7F4F00">读 = read + unlink（消费式）</text>
  <!-- teammates -->
  <rect x="546" y="78" width="160" height="54" rx="7" fill="#D5E8D4" stroke="#82B366" stroke-width="1.6"/>
  <text x="626" y="100" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#2D5A2D">队友 1</text>
  <text x="626" y="118" text-anchor="middle" font-size="9.5" fill="#5a8a5a">独立线程·精简工具集</text>
  <rect x="546" y="168" width="160" height="54" rx="7" fill="#D5E8D4" stroke="#82B366" stroke-width="1.6"/>
  <text x="626" y="190" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#2D5A2D">队友 2</text>
  <text x="626" y="208" text-anchor="middle" font-size="9.5" fill="#5a8a5a">独立线程</text>
  <!-- task board -->
  <rect x="300" y="252" width="240" height="40" rx="7" fill="#E1D5E7" stroke="#9673A6" stroke-width="1.6"/>
  <text x="420" y="277" text-anchor="middle" font-size="12" fill="#553a66">任务板 .tasks/（自治认领）</text>
  <!-- edges Lead<->Bus -->
  <path d="M150,148 L204,148" stroke="#6C8EBF" stroke-width="1.6" marker-end="url(#tm-s)" marker-start="url(#tm-e)"/>
  <!-- Bus<->T1 -->
  <path d="M486,120 L540,105" stroke="#6C8EBF" stroke-width="1.6" marker-end="url(#tm-s)" marker-start="url(#tm-e)"/>
  <!-- Bus<->T2 -->
  <path d="M486,180 L540,195" stroke="#6C8EBF" stroke-width="1.6" marker-end="url(#tm-s)" marker-start="url(#tm-e)"/>
  <!-- teammates -.-> board -->
  <path d="M600,222 L470,250" stroke="#9673A6" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#tm-d)"/>
  <path d="M560,222 L450,250" stroke="#9673A6" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#tm-d)"/>
  <text x="24" y="40" font-size="12" fill="#999999">一个搞不定，组队来 · 消费式读取保证消息只处理一次</text>
</svg>
