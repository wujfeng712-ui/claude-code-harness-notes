<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 470" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="hp-a" markerWidth="9" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#888888"/></marker>
    <marker id="hp-g" markerWidth="9" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#82B366"/></marker>
    <marker id="hp-b" markerWidth="9" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#6C8EBF"/></marker>
  </defs>
  <g font-size="11.5">
    <rect x="150" y="30" width="300" height="34" rx="6" fill="#F5F5F5" stroke="#888888" stroke-width="1.4"/><text x="300" y="52" text-anchor="middle" fill="#333">① UserPromptSubmit hooks</text>
    <rect x="150" y="76" width="300" height="34" rx="6" fill="#EAF0FB" stroke="#6C8EBF" stroke-width="1.4"/><text x="300" y="98" text-anchor="middle" fill="#1F3D66">② 注入 cron prompt + 后台 task_notification</text>
    <rect x="150" y="122" width="300" height="34" rx="6" fill="#FCEAEA" stroke="#B85450" stroke-width="1.4"/><text x="300" y="144" text-anchor="middle" fill="#6B2B28">③ 压缩管线 budget → snip → micro</text>
    <rect x="150" y="168" width="300" height="34" rx="6" fill="#FFF6E6" stroke="#D79B00" stroke-width="1.4"/><text x="300" y="190" text-anchor="middle" fill="#7F4F00">④ assemble_system_prompt（memory+skills+MCP）</text>
    <rect x="150" y="214" width="300" height="34" rx="6" fill="#F0F7F0" stroke="#82B366" stroke-width="1.4"/><text x="300" y="236" text-anchor="middle" fill="#2D5A2D">⑤ LLM + error recovery（重试/升 token/压缩）</text>
  </g>
  <polygon points="300,266 388,300 300,334 212,300" fill="#FFE6CC" stroke="#D79B00" stroke-width="1.6"/>
  <text x="300" y="304" text-anchor="middle" font-size="12" fill="#7F4F00">has_tool_use?</text>
  <rect x="60" y="372" width="420" height="42" rx="7" fill="#D5E8D4" stroke="#82B366" stroke-width="1.6"/>
  <text x="270" y="389" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#2D5A2D">是 → PreToolUse(权限) → 执行工具 → PostToolUse → 回填</text>
  <text x="270" y="405" text-anchor="middle" font-size="9.5" fill="#5a8a5a">（可走后台线程）然后进入下一轮</text>
  <rect x="470" y="278" width="118" height="44" rx="7" fill="#F8CECC" stroke="#B85450" stroke-width="1.6"/>
  <text x="529" y="297" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#6B2B28">否 → Stop hooks</text>
  <text x="529" y="313" text-anchor="middle" font-size="9.5" fill="#a04a45">返回</text>
  <path d="M300,64 L300,72" stroke="#888888" stroke-width="1.4" marker-end="url(#hp-a)"/>
  <path d="M300,110 L300,118" stroke="#888888" stroke-width="1.4" marker-end="url(#hp-a)"/>
  <path d="M300,156 L300,164" stroke="#888888" stroke-width="1.4" marker-end="url(#hp-a)"/>
  <path d="M300,202 L300,210" stroke="#888888" stroke-width="1.4" marker-end="url(#hp-a)"/>
  <path d="M300,248 L300,262" stroke="#888888" stroke-width="1.4" marker-end="url(#hp-a)"/>
  <path d="M300,334 L300,368" stroke="#82B366" stroke-width="1.6" marker-end="url(#hp-g)"/>
  <path d="M388,300 L466,300" stroke="#B85450" stroke-width="1.6" marker-end="url(#pg-r)"/>
  <path d="M60,393 L30,393 L30,140 L146,139" fill="none" stroke="#6C8EBF" stroke-width="1.5" marker-end="url(#hp-b)"/>
