  <text x="36" y="250" font-size="9.5" fill="#6C8EBF" transform="rotate(-90 36 250)">下一轮 loop</text>
  <text x="14" y="22" font-size="12" fill="#999999">s20 · 机制很多，循环一个 · 前 19 章全部挂在这条管道上</text>
