  <rect x="50" y="70" width="280" height="190" rx="9" fill="#DAE8FC" stroke="#6C8EBF" stroke-width="1.8"/>
  <text x="190" y="96" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1F3D66">厚 harness（全部内建）</text>
  <g font-size="11" fill="#1F3D66">
    <rect x="70" y="112" width="115" height="30" rx="5" fill="#EAF0FB" stroke="#6C8EBF" stroke-width="1.2"/><text x="127" y="131" text-anchor="middle">权限 · 钩子</text>
    <rect x="195" y="112" width="115" height="30" rx="5" fill="#EAF0FB" stroke="#6C8EBF" stroke-width="1.2"/><text x="252" y="131" text-anchor="middle">记忆 · 压缩</text>
    <rect x="70" y="150" width="115" height="30" rx="5" fill="#EAF0FB" stroke="#6C8EBF" stroke-width="1.2"/><text x="127" y="169" text-anchor="middle">子 Agent</text>
    <rect x="195" y="150" width="115" height="30" rx="5" fill="#EAF0FB" stroke="#6C8EBF" stroke-width="1.2"/><text x="252" y="169" text-anchor="middle">MCP · 团队</text>
    <rect x="70" y="188" width="115" height="30" rx="5" fill="#EAF0FB" stroke="#6C8EBF" stroke-width="1.2"/><text x="127" y="207" text-anchor="middle">Cron</text>
    <rect x="195" y="188" width="115" height="30" rx="5" fill="#EAF0FB" stroke="#6C8EBF" stroke-width="1.2"/><text x="252" y="207" text-anchor="middle">Worktree</text>
  </g>
  <text x="190" y="244" text-anchor="middle" font-size="12" font-weight="bold" fill="#6C8EBF">🔋 电池全含</text>
