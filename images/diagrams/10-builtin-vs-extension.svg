<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 320" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="bx-a" markerWidth="9" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#82B366"/></marker>
  </defs>
  <text x="190" y="36" text-anchor="middle" font-size="14" font-weight="bold" fill="#1F3D66">Claude Code</text>
  <text x="190" y="54" text-anchor="middle" font-size="10.5" fill="#888888">内建分层 · 开箱即全</text>
  <text x="560" y="36" text-anchor="middle" font-size="14" font-weight="bold" fill="#2D5A2D">pi</text>
