  <path d="M490,126 L470,166" stroke="#82B366" stroke-width="1.4" marker-end="url(#bx-a)"/>
  <path d="M560,126 L560,166" stroke="#82B366" stroke-width="1.4" marker-end="url(#bx-a)"/>
  <path d="M630,126 L650,166" stroke="#82B366" stroke-width="1.4" marker-end="url(#bx-a)"/>
  <text x="560" y="252" text-anchor="middle" font-size="12" font-weight="bold" fill="#82B366">🔧 自己装电池</text>
  <text x="14" y="16" font-size="11.5" fill="#999999">同一个循环，两条相反的 harness 哲学</text>
