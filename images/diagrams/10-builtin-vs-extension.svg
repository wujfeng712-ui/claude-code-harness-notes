  <text x="560" y="100" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#2D5A2D">薄内核 agent-core</text>
  <text x="560" y="116" text-anchor="middle" font-size="9.5" fill="#5a8a5a">循环 · 工具 · 钩子</text>
