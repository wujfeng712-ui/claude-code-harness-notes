    <rect x="430" y="170" width="80" height="56" rx="6" fill="#F0F7F0" stroke="#82B366" stroke-width="1.3"/><text x="470" y="195" text-anchor="middle" fill="#2D5A2D">TS 扩展</text><text x="470" y="211" text-anchor="middle" font-size="8.5" fill="#5a8a5a">权限/子Agent</text>
    <rect x="520" y="170" width="80" height="56" rx="6" fill="#F0F7F0" stroke="#82B366" stroke-width="1.3"/><text x="560" y="195" text-anchor="middle" fill="#2D5A2D">Skills</text><text x="560" y="211" text-anchor="middle" font-size="8.5" fill="#5a8a5a">/MCP 自建</text>
    <rect x="610" y="170" width="80" height="56" rx="6" fill="#F0F7F0" stroke="#82B366" stroke-width="1.3"/><text x="650" y="195" text-anchor="middle" fill="#2D5A2D">容器隔离</text><text x="650" y="211" text-anchor="middle" font-size="8.5" fill="#5a8a5a">权限外置</text>
